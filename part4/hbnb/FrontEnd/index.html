<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBnB — Find Your Perfect Stay</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <a href="index.html"><img src="logo.png" alt="HBnB" class="logo" style="height:38px;width:auto;object-fit:contain;" /></a>
      <nav>
        <a href="index.html" class="active">Explore</a>
        <a href="login.html" class="login-button">Login</a>
      </nav>
    </div>
  </header>

  <!-- ── Hero ── -->
  <section class="hero">
    <h1>Discover Exceptional Places<br>to Stay</h1>
    <p>Hand-picked stays for the discerning traveller</p>
  </section>

  <!-- ── Filter Bar ── -->
  <div class="filter-bar">
    <div class="filter-bar-inner">
      <label for="price-filter">Filter by price:</label>
      <select id="price-filter" name="price-filter">
        <option value="all">All prices</option>
        <option value="0-50">Under $50 / night</option>
        <option value="50-150">$50 – $150 / night</option>
        <option value="150-300">$150 – $300 / night</option>
        <option value="300+">$300+ / night</option>
      </select>
    </div>
  </div>

  <!-- ── Main Content ── -->
  <main>
    <h2 class="section-title">Available Places</h2>

    <div class="places-grid">
      <!-- Les cards sont générées par scripts.js -->
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>&copy; 2026 <strong>HBnB</strong> — All rights reserved.</p>
  </footer>
  <script src="scripts.js"></script>
</body>
</html>
