<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
    <div id="place-details">
        <p>Chargement des détails du lieu...</p>
    </div>

    <div id="add-review" style="display: none; margin-top: 20px; padding: 15px; border-top: 1px solid #ccc;">
        <h3>Ajouter un avis</h3>
        <form id="review-form">
            <textarea id="review-text" placeholder="Écrivez votre avis ici..." rows="4" style="width: 100%;" required></textarea>
            <br>
            <button type="submit" style="margin-top: 10px;">Envoyer l'avis</button>
        </form>
    </div>
</main>
    <script src="scripts.js"></script>
</body>
</html>
