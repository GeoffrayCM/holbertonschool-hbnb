<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBnB — Login</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <a href="index.html"><img src="logo.png" alt="HBnB" class="logo" style="height:38px;width:auto;object-fit:contain;" /></a>
      <nav>
        <a href="index.html">Explore</a>
        <a href="login.html" class="login-button active">Login</a>
      </nav>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="auth-wrapper">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to access your account and manage your stays.</p>

      <form class="form" novalidate>

        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <p id="login-error" style="color:var(--accent);font-size:.85rem;min-height:1.2em;"></p>
        <button type="button" class="form-submit" id="login-btn">Sign In</button>

      </form>

      <p class="form-footer">
        Don&rsquo;t have an account? <a href="#">Create one</a>
      </p>
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>&copy; 2026 <strong>HBnB</strong> — All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
